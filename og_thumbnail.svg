<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141414;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8f060;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60d4f0;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#2a2a2a" stroke-width="0.8"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Glow circle -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#c8f060;stop-opacity:0.06"/>
    <stop offset="100%" style="stop-color:#c8f060;stop-opacity:0"/>
  </radialGradient>
  <ellipse cx="600" cy="315" rx="500" ry="350" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="80" y="80" width="120" height="3" fill="url(#accent-line)" rx="2"/>

  <!-- Tag -->
  <rect x="80" y="100" width="220" height="32" fill="#c8f06018" rx="3"/>
  <text x="96" y="122" font-family="monospace" font-size="13" fill="#c8f060" letter-spacing="2">PORTFOLIO · 2026</text>

